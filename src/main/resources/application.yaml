spring:
  application:
    name: user-devops
  datasource:
    url: jdbc:h2:file:./data/user-devops;AUTO_SERVER=TRUE
    username: sa
    password:
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
  web:
    error:
      include-stacktrace: never